<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&family=Play:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="game.css" />
    <title>UNO Online</title>
</head>

<body>
    <div id="lobby_view" style="display: none">
        <header>
            <h1 class="header-title">UNO Online</h1>
            <div class="game-code-group">
                <h1 class="game-code-label">Game Code:</h1>
                <h1 class="code"></h1>
            </div>
        </header>
        <div class="centre-content">
            <h2 class="centre-content-title">Players</h2>
            <div class="player-list"></div>
            <div class="centre-content-btns">
                <div class="left-btns">
                    <button id="leave-btn">Leave</button>
                </div>
                <div class="right-btns">
                    <button id="add-bot-btn">Add Bot</button>
                    <button id="start-game-btn">Start Game</button>
                </div>
            </div>
        </div>
    </div>

    <div id="game_view" style="display: none">
        <p id="current_player"></p>
        <img id="top_card"></img>
        <p id="colour_effect"></p>
        <p id="hand_title"></p>
        <div id="hand"></div>

        <label for="colour_choice">Wild colour: </label>
        <select name="colour_choice" id="colour_choice">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="yellow">Yellow</option>
        </select><br>

        <button id="draw_card_btn">Draw Card</button>
    </div>
    <div id="end_game_view" style="display: none">
        <h3 id="winner"></h3>
        <button id="back_to_lobby_btn">Back To Lobby</button>
    </div>
</body>
<script src="/socket.io/socket.io.js"></script>
<script type="module" src="client.js"></script>

</html>
