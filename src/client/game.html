<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Online</title>
</head>

<body>
    <div id="lobby_view" style="display: none">
        <h3>Waiting for others to join...</h3>
        <h4 id="room_code"></h4>
        <h3>Players</h3>
        <div id="user_list"></div><br>
        <button id="add_bot_btn">Add Bot</button>
        <button id="start_game_btn">Start Game</button>
    </div>

    <div id="game_view" style="display: none">
        <p id="current_player"></p>
        <img id="top_card"></img>
        <p id= "colour_effect"></p>
        <p id="hand_title"></p>
        <div id="hand"></div>

        <label for="colour_choice">Wild colour: </label>
        <select name="colour_choice" id="colour_choice">
            <option value="red">Red</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="yellow">Yellow</option>
        </select><br>
        
        <button id="draw_card_btn">Draw Card</button>
    </div>
    <div id="end_game_view" style="display: none">
        <h3 id="winner"></h3>
        <button id="back_to_lobby_btn">Back To Lobby</button>
    </div>
</body>
<script src="/socket.io/socket.io.js"></script>
<script type="module" src="client.js"></script>

</html>
