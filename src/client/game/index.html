<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&family=Play:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/base.css" />
    <link rel="stylesheet" href="game.css" />
    <title>UNO Online</title>
</head>

<body>
    <div id="game_view">
        <div class="top section-content">
            <div class="player-container"></div>
        </div>

        <div class="centre section-content">
            <img id="top_card"></img>
            <div class="colour-picker" style="display: none">
                <p class="colour-picker-label">Pick a Colour</p>
                <button id="red" class="colour-btn">Red</button>
                <button id="yellow" class="colour-btn">Yellow</button>
                <button id="green" class="colour-btn">Green</button>
                <button id="blue" class="colour-btn">Blue</button>
            </div>
            <p id="colour_effect"></p>
        </div>

        <div class="bottom section-content">
            <div class="hand" id="hand"></div>
            <button id="draw_card_btn">Draw Card</button>
        </div>
    </div>

    <div id="end_game_view" style="display: none">
        <h3 id="winner"></h3>
        <button id="back_to_lobby_btn">Back To Lobby</button>
    </div>
</body>
<script src="/socket.io/socket.io.js"></script>
<script type="module" src="client.js"></script>

</html>
