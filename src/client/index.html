<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+15&family=Play:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="landing.css" />
    <title>UNO Online</title>
  </head>

  <body>
    <div id="top_carousel" class="carousel">
      <div id="top_group" class="card-group">
      </div>
    </div>

    <div class="centre-content">
      <h1 class="title">UNO Online</h1>

      <div class="main-menu">
        <button
          class="start-btn"
          onclick="window.location.href = 'game.html?action=create'"
        >
          Start a Game
        </button>

        <p class="text_separator">OR</p>

        <button
          class="start-btn"
          onclick="window.location.href = 'game.html?action=join'"
        >
          Join a Game
        </button>
      </div>
    </div>

    <div id="bottom_carousel" class="carousel">
      <div id="bottom_group" class="card-group">
      </div>
    </div>
    
  <script type="module" src="index.js"></script>
</html>
